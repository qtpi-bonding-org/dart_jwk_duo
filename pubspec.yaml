name: jwk_duo
description: A thin, type-safe wrapper around package:webcrypto for managing a JWK Set containing exactly 2 RSA key pairs.
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  webcrypto:
    path: ./webcrypto.dart

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.example.jwk_duo
        pluginClass: JwkDuoPlugin
      ios:
        pluginClass: JwkDuoPlugin