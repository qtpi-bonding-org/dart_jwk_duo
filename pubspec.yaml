name: dart_jwk_duo
description: A thin, type-safe wrapper around package:webcrypto for managing a JWK Set containing exactly 2 RSA key pairs.
version: 1.0.0
homepage: https://github.com/yourusername/dart_jwk_duo
repository: https://github.com/yourusername/dart_jwk_duo

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  webcrypto: ^0.6.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0